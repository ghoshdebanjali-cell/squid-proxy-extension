<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        /* Basic styles for tabs */
        .tab {
            display: none;
        }
        .tab.active {
            display: block;
        }
        .tab-button {
            cursor: pointer;
            padding: 10px;
            border: none;
            background: lightgray;
        }
        .tab-button.active {
            background: gray;
            color: white;
        }
    </style>
</head>
<body>
    <div>
        <button class="tab-button active" onclick="showTab('socDashboard')">SOC Dashboard</button>
        <button class="tab-button" onclick="showTab('incidentWorkbench')">Incident Workbench</button>
    </div>
    <div id="socDashboard" class="tab active">
        <h1>SOC Dashboard</h1>
        <!-- SOC Dashboard content goes here -->
    </div>
    <div id="incidentWorkbench" class="tab">
        <h1>Incident Workbench</h1>
        <!-- Incident Workbench content goes here -->
    </div>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-button').forEach(button => {
                button.classList.remove('active');
            });
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
